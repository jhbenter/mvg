  <script type="text/javascript" src="https://www.mvv-muenchen.de/typo3conf/ext/sn_mvv_efa/Resources/Public/mvv-monitor/mvv-monitor.min.js"></script>
  <script>
    // Line number -> background color
    var lineColors = {
      '25': '#e3007a', '58': '#ef7d00', '68': '#ef7d00',
      'N45': '#2d3087'
    };

    function extractAndRebuild() {
      var srcTable = document.querySelector('.mvv-departure-monitor table');
      if (!srcTable) return setTimeout(extractAndRebuild, 500);

      var watchTable = document.getElementById('watch-table');

      function rebuild() {
        var rows = srcTable.querySelectorAll('tbody tr');
        var html = '';
        rows.forEach(function(row) {
          var cells = row.querySelectorAll('td');
          if (cells.length < 5) return;

          // Col 0: Linie (get text, strip whitespace)
          var lineText = cells[0].textContent.trim();
          var bgColor = lineColors[lineText] || '#555';

          // Col 1: Richtung (truncate to 10 chars)
          var dir = cells[1].textContent.trim();
          if (dir.length > 10) dir = dir.substring(0, 10);

          // Col 4: Live time (or col 3 Abfahrt as fallback)
          var time = cells[4].textContent.trim() || cells[3].textContent.trim();

          html += '<tr>'
            + '<td class="col-line"><span class="line-badge" style="background:' + bgColor + '">' + lineText + '</span></td>'
            + '<td class="col-dir">' + dir + '</td>'
            + '<td class="col-time">' + time + '</td>'
            + '</tr>';
        });
        watchTable.innerHTML = html;
      }

      rebuild();

      // Rebuild when widget refreshes (every 2 min)
      new MutationObserver(rebuild)
        .observe(srcTable, { childList: true, subtree: true });
    }

    extractAndRebuild();
  </script>
