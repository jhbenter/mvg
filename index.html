  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      color: #fff;
      font-family: -apple-system, system-ui, sans-serif;
      font-size: 14px;
      -webkit-text-size-adjust: none;
      overflow-x: hidden;
    }

    /* Make the MVV widget fit the small screen */
    .mvv-departure-monitor {
      width: 100% !important;
      max-width: 100vw !important;
      overflow-x: hidden !important;
    }

    /* Override MVV widget styles for Apple Watch readability */
    .mvv-departure-monitor * {
      font-size: 12px !important;
      line-height: 1.3 !important;
    }

    .mvv-departure-monitor table {
      width: 100% !important;
      table-layout: fixed !important;
    }

    .mvv-departure-monitor td,
    .mvv-departure-monitor th {
      padding: 2px 3px !important;
      white-space: nowrap !important;
      overflow: hidden !important;
      text-overflow: ellipsis !important;
    }

    /* Hide elements that waste space on tiny screens */
    .mvv-departure-monitor .departure-monitor__header,
    .mvv-departure-monitor .departure-monitor__footer,
    .mvv-departure-monitor .departure-monitor__notification {
      display: none !important;
    }

    /* High contrast for OLED */
    .mvv-departure-monitor .departure-monitor__table th {
      background: #111 !important;
      color: #ccc !important;
    }

    .mvv-departure-monitor .departure-monitor__table td {
      background: #000 !important;
      color: #fff !important;
    }

    .mvv-departure-monitor .departure-monitor__table tr {
      border-bottom: 1px solid #222 !important;
    }

    /* Make line badges smaller */
    .mvv-departure-monitor img {
      height: 16px !important;
      width: auto !important;
    }
  </style>
