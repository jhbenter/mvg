  <script>
    // Wait for widget to render, then restyle once
    function fixOnce() {
      var table = document.querySelector('.mvv-departure-monitor table');
      if (!table) return setTimeout(fixOnce, 500);

      // Inject style tag at end of body (highest cascade order)
      var style = document.createElement('style');
      style.textContent = [
        // Use body.watch-mode as specificity anchor
        'body.watch-mode .mvv-departure-monitor { background:#000 !important }',
        'body.watch-mode .mvv-departure-monitor > div { background:#000 !important; border:none !important; box-shadow:none !important }',

        // Hide header, footer, etc
        'body.watch-mode [class*="header"] { display:none !important }',
        'body.watch-mode [class*="footer"] { display:none !important }',
        'body.watch-mode [class*="notification"] { display:none !important }',
        'body.watch-mode [class*="stop-name"] { display:none !important }',
        'body.watch-mode [class*="stop-info"] { display:none !important }',

        // Table dark
        'body.watch-mode table { width:100% !important; border-collapse:collapse !important; background:#000 !important }',
        'body.watch-mode thead { display:none !important }',
        'body.watch-mode tr { background:#000 !important }',

        // Hide Gleis (col3) and Abfahrt (col4)
        'body.watch-mode td:nth-child(3) { display:none !important }',
        'body.watch-mode th:nth-child(3) { display:none !important }',
        'body.watch-mode td:nth-child(4) { display:none !important }',
        'body.watch-mode th:nth-child(4) { display:none !important }',

        // Linie (col1)
        'body.watch-mode td:nth-child(1) { background:#000 !important; color:#fff !important; padding:6px 2px !important; text-align:center !important; width:44px !important; font-size:14px !important; border-bottom:1px solid #222 !important }',

        // Richtung (col2)
        'body.watch-mode td:nth-child(2) { background:#000 !important; color:#ccc !important; padding:6px 4px !important; font-size:12px !important; white-space:nowrap !important; overflow:hidden !important; text-overflow:ellipsis !important; max-width:120px !important; border-bottom:1px solid #222 !important }',
        'body.watch-mode td:nth-child(2) span { color:#ccc !important }',

        // Live (col5)
        'body.watch-mode td:nth-child(5) { background:#000 !important; color:#4f4 !important; padding:6px 4px !important; font-size:14px !important; font-weight:bold !important; text-align:right !important; white-space:nowrap !important; width:52px !important; border-bottom:1px solid #222 !important }',
        'body.watch-mode td:nth-child(5) span { color:#4f4 !important }',
        'body.watch-mode td:nth-child(5) a { color:#4f4 !important }',

        // Images
        'body.watch-mode img { height:20px !important; width:auto !important; vertical-align:middle !important }',

        // Links
        'body.watch-mode a { color:inherit !important; text-decoration:none !important }',
      ].join('\n');

      document.body.classList.add('watch-mode');
      document.body.appendChild(style);
    }

    fixOnce();
  </script>
